<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarang Travels</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:550px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:35px;
    border:1px solid rgba(255,255,255,0.3);
    box-shadow:0 15px 35px rgba(0,0,0,.4);
    color:white;
}

.logo{
    text-align:center;
    font-size:42px;
    margin-bottom:10px;
}

h1{
    text-align:center;
    font-size:36px;
    color:#FFD700;
}

h3{
    text-align:center;
    margin-bottom:25px;
    color:#f1f1f1;
    font-weight:normal;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    margin-top:6px;
    border:none;
    border-radius:10px;
    outline:none;
    font-size:15px;
}

input:focus,
select:focus,
textarea:focus{
    box-shadow:0 0 10px #FFD700;
}

.gender{
    margin-top:10px;
}

.gender input{
    width:auto;
    margin-right:6px;
}

button{
    width:100%;
    margin-top:25px;
    padding:14px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,#FFD700,#FFA500);
    color:#222;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 20px rgba(255,215,0,.5);
}

footer{
    text-align:center;
    margin-top:25px;
    font-size:14px;
    color:#ddd;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">✈️</div>

<h1>Tarang Travels</h1>
<h3>Your Journey Begins Here</h3>

<form>

<label>Full Name</label>
<input type="text" placeholder="Enter Your Name" required>

<label>Email Address</label>
<input type="email" placeholder="Enter Email" required>

<label>Mobile Number</label>
<input type="tel" placeholder="Enter Mobile Number" required>

<label>Destination</label>
<select required>
<option>Select Destination</option>
<option>Goa</option>
<option>Manali</option>
<option>Kashmir</option>
<option>Jaipur</option>
<option>Dubai</option>
<option>Singapore</option>
</select>

<label>Departure Date</label>
<input type="date" required>

<label>Number of Travelers</label>
<input type="number" min="1" placeholder="Enter Number of Travelers">

<label>Travel Type</label>

<div class="gender">
<input type="radio" name="travel"> Solo
<input type="radio" name="travel"> Family
<input type="radio" name="travel"> Friends
</div>

<label>Special Requests</label>
<textarea rows="4" placeholder="Any special requirements?"></textarea>

<button type="submit">Book Your Trip ✈️</button>

</form>

<footer>
© 2026 Tarang Travels | Explore the World With Us 🌍
</footer>

</div>

</body>
</html>
