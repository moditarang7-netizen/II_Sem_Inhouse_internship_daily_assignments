<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarang Travels</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

/* Theme Variables */
:root{
    --bg:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    --card:rgba(255,255,255,.15);
    --text:#fff;
    --heading:#FFD700;
    --border:rgba(255,255,255,.3);
    --footer:#ddd;
    --input-bg:#fff;
    --input-text:#000;
}

body.light{
    --bg:linear-gradient(135deg,#f7f7f7,#dfe9f3,#ffffff);
    --card:rgba(255,255,255,.95);
    --text:#222;
    --heading:#0d6efd;
    --border:#ccc;
    --footer:#444;
    --input-bg:#f9f9f9;
    --input-text:#222;
}

body{
    background:var(--bg);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
    transition:0.4s ease;
}

.container{
    width:100%;
    max-width:550px;
    background:var(--card);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:35px;
    border:1px solid var(--border);
    box-shadow:0 15px 35px rgba(0,0,0,.4);
    color:var(--text);
    transition:0.4s ease;
}

.theme-toggle{
    float:right;
    padding:10px 18px;
    border:none;
    border-radius:20px;
    background:linear-gradient(45deg,#FFD700,#FFA500);
    color:#222;
    font-size:14px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    width:auto;
    margin-top:0;
}

.theme-toggle:hover{
    transform:scale(1.05);
}

.logo{
    text-align:center;
    font-size:42px;
    margin-bottom:10px;
    clear:both;
}

h1{
    text-align:center;
    font-size:36px;
    color:var(--heading);
}

h3{
    text-align:center;
    margin-bottom:25px;
    font-weight:normal;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    margin-top:6px;
    border:none;
    border-radius:10px;
    outline:none;
    font-size:15px;
    background:var(--input-bg);
    color:var(--input-text);
}

input:focus,
select:focus,
textarea:focus{
    box-shadow:0 0 10px #FFD700;
}

.gender{
    margin-top:10px;
}

.gender label{
    display:inline-block;
    margin-right:20px;
    font-weight:normal;
}

.gender input{
    width:auto;
    margin-right:5px;
}

.submit-btn{
    width:100%;
    margin-top:25px;
    padding:14px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,#FFD700,#FFA500);
    color:#222;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.submit-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 20px rgba(255,215,0,.5);
}

footer{
    text-align:center;
    margin-top:25px;
    font-size:14px;
    color:var(--footer);
}
</style>

</head>
<body>

<div class="container">

<button class="theme-toggle" onclick="toggleTheme()" type="button">
🌙 Dark Mode
</button>

<div class="logo">✈️</div>

<h1>Tarang Travels</h1>
<h3>Your Journey Begins Here</h3>

<form>

<label>Full Name</label>
<input type="text" placeholder="Enter Your Name" required>

<label>Email Address</label>
<input type="email" placeholder="Enter Email" required>

<label>Mobile Number</label>
<input type="tel" placeholder="Enter Mobile Number" required>

<label>Destination</label>
<select required>
<option value="">Select Destination</option>
<option>Goa</option>
<option>Manali</option>
<option>Kashmir</option>
<option>Jaipur</option>
<option>Dubai</option>
<option>Singapore</option>
</select>

<label>Departure Date</label>
<input type="date" required>

<label>Number of Travelers</label>
<input type="number" min="1" placeholder="Enter Number of Travelers">

<label>Travel Type</label>

<div class="gender">
<label><input type="radio" name="travel"> Solo</label>
<label><input type="radio" name="travel"> Family</label>
<label><input type="radio" name="travel"> Friends</label>
</div>

<label>Special Requests</label>
<textarea rows="4" placeholder="Any special requirements?"></textarea>

<button class="submit-btn" type="submit">
Book Your Trip ✈️
</button>

</form>

<footer>
© 2026 Tarang Travels | Explore the World With Us 🌍
</footer>

</div>

<script>
function toggleTheme(){
    document.body.classList.toggle("light");

    const btn=document.querySelector(".theme-toggle");

    if(document.body.classList.contains("light")){
        btn.innerHTML="☀️ Light Mode";
        localStorage.setItem("theme","light");
    }else{
        btn.innerHTML="🌙 Dark Mode";
        localStorage.setItem("theme","dark");
    }
}

window.onload=function(){
    const savedTheme=localStorage.getItem("theme");

    if(savedTheme==="light"){
        document.body.classList.add("light");
        document.querySelector(".theme-toggle").innerHTML="☀️ Light Mode";
    }
}
</script>

</body>
</html>
